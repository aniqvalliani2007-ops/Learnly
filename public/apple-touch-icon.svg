<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- iOS requires no rounded corners, system adds them -->
  <rect width="180" height="180" fill="url(#gradient)"/>
  
  <!-- Letter "L" - Centered and scaled -->
  <path d="M56 45H78V123H123V145H56V45Z" fill="white"/>
  
  <!-- Sparkle accent -->
  <circle cx="135" cy="45" r="7" fill="#6366F1" opacity="0.8"/>
  <circle cx="135" cy="45" r="3.5" fill="white"/>
  
  <!-- Subtle shine effect on top -->
  <rect x="0" y="0" width="180" height="90" fill="url(#shine)" opacity="0.1"/>
  
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="shine" x1="90" y1="0" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
